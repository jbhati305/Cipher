services:
  cipher-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cipher-api
    env_file:
      - .env
    environment:
      CIPHER_API_HOST: 0.0.0.0
      CIPHER_DATA_DIR: /data
      CIPHER_EXPORTS_DIR: /data/exports
      CIPHER_SQLITE_PATH: /data/cipher.sqlite3
      MEMOS_BASE_URL: http://memos:8000
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8181:8181"
    volumes:
      - cipher_data:/data
      - ./.secrets:/app/.secrets
    depends_on:
      - qdrant
    restart: unless-stopped

  cipher-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cipher-worker
    command: ["uv", "run", "cipher-worker"]
    env_file:
      - .env
    environment:
      CIPHER_DATA_DIR: /data
      CIPHER_EXPORTS_DIR: /data/exports
      CIPHER_SQLITE_PATH: /data/cipher.sqlite3
      MEMOS_BASE_URL: http://memos:8000
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - cipher_data:/data
    depends_on:
      - cipher-api
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: cipher-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  memos:
    image: ghcr.io/memtensor/memos:latest
    container_name: cipher-memos
    profiles: ["memos"]
    environment:
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - memos_data:/data
    depends_on:
      - qdrant
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: cipher-ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  cipher_data:
  qdrant_data:
  memos_data:
  ollama_data:
